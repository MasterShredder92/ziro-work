name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Service-role guard (src/app/api/)
        run: |
          violations=$(grep -rl "getServiceClient" src/app/api/ | while read -r f; do
            grep -q "assertServiceRoleAllowed" "$f" || echo "$f"
          done)
          if [ -n "$violations" ]; then
            echo "ERROR: These files use getServiceClient() without assertServiceRoleAllowed():"
            echo "$violations"
            exit 1
          fi
          echo "Service-role guard (src/app/api/) passed."

      - name: Service-role guard (lib/data/)
        run: |
          violations=$(grep -rl "getServiceClient" lib/data/ 2>/dev/null | while read -r f; do
            grep -q "assertServiceRoleAllowed" "$f" || echo "$f"
          done)
          if [ -n "$violations" ]; then
            echo "ERROR: These files use getServiceClient() without assertServiceRoleAllowed():"
            echo "$violations"
            exit 1
          fi
          echo "Service-role guard (lib/data/) passed."

      - name: Service-role guard (src/lib/)
        run: |
          violations=$(grep -rl "getServiceClient" src/lib/ | grep -v "src/lib/supabase.ts" | while read -r f; do
            grep -q "assertServiceRoleAllowed" "$f" || echo "$f"
          done)
          if [ -n "$violations" ]; then
            echo "ERROR: These files use getServiceClient() without assertServiceRoleAllowed():"
            echo "$violations"
            exit 1
          fi
          echo "Service-role guard (src/lib/) passed."

      - name: Lint
        run: npm run lint

      - name: API smoke tests
        run: npm run test:smoke
